<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoBlock - 結合バグ修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .puzzle-block {
            position: absolute;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.875rem;
            cursor: move;
            z-index: 20;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .joint-none { border-radius: 8px; }
        .joint-left { border-radius: 8px 0 0 8px; border-right: none; }
        .joint-right { border-radius: 0 8px 8px 0; border-left: none; }
        .joint-middle { border-radius: 0; border-x: none; }

        .joint-left::after, .joint-middle::after {
            content: ''; position: absolute; right: -6px; top: 12px;
            width: 12px; height: 16px; background: inherit;
            border: 2px solid rgba(255, 255, 255, 0.15); border-left: none;
            border-radius: 0 4px 4px 0; z-index: 30;
        }
        .joint-right::before, .joint-middle::before {
            content: ''; position: absolute; left: -2px; top: 12px;
            width: 6px; height: 16px; background: #0b0f19;
            border: 2px solid rgba(255, 255, 255, 0.15); border-left: none;
            border-radius: 0 4px 4px 0; z-index: 25;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden h-screen w-screen flex flex-col">

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col p-4 z-50 overflow-y-auto no-scrollbar shadow-2xl">
            <h1 class="text-xl font-bold tracking-wider mb-4 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">LingoBlock</h1>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 mb-1">ジャンル選択</label>
                <select id="genre-select" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm focus:outline-none"><option value="myblocks">マイブロック</option></select>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-undo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium disabled:opacity-30">UNDO</button>
                <button id="btn-redo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium disabled:opacity-30">REDO</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-xs py-1.5 rounded font-medium col-span-2">ブラウザに保存</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-open-media" class="bg-indigo-600 hover:bg-indigo-500 text-xs py-1.5 rounded font-medium">IMAGE CAPTURE</button>
                <button id="btn-open-add" class="bg-emerald-600 hover:bg-emerald-500 text-xs py-1.5 rounded font-medium">ブロック追加</button>
            </div>
            <div class="mb-4 border-t border-gray-700 pt-3">
                <label class="block text-xs font-semibold text-gray-400 mb-1">データコードエリア</label>
                <textarea id="save-code-area" class="w-full h-16 bg-gray-900 border border-gray-700 rounded p-1 text-xs font-mono resize-none focus:outline-none text-emerald-400" placeholder="コード..."></textarea>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button id="btn-export" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">SAVE CODE</button>
                    <button id="btn-import" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">LOAD CODE</button>
                </div>
                <button id="btn-reset" class="w-full bg-red-600 hover:bg-red-500 text-xs py-1 rounded mt-2 font-medium">ALL RESET</button>
            </div>
            <div class="flex-1 border-t border-gray-700 pt-3 flex flex-col overflow-hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-2">パレット</label>
                <div id="palette-container" class="flex-1 overflow-y-auto space-y-2 p-1 bg-gray-900/50 rounded border border-gray-800/80 min-h-[150px]"></div>
            </div>
        </aside>

        <main class="flex-1 relative bg-gray-950 overflow-hidden" id="editor-container">
            <div id="editor-workspace" class="absolute inset-0 origin-top-left touch-none" style="width: 3000px; height: 3000px; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 24px 24px;"></div>
        </main>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl w-80 shadow-2xl">
            <h3 class="text-base font-bold mb-4 text-emerald-400">✨ カスタムブロック追加</h3>
            <div class="space-y-3 text-sm">
                <input type="text" id="add-word" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white" placeholder="example">
                <select id="add-pos" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white">
                    <option value="名詞">名詞 (青)</option><option value="代名詞">代名詞 (水色)</option><option value="形容詞">形容詞 (緑)</option>
                    <option value="副詞">副詞 (深緑)</option><option value="前置詞">前置詞 (オレンジ)</option><option value="助動詞">助動詞 (赤)</option>
                    <option value="冠詞">冠詞 (黄色)</option><option value="疑問詞">疑問詞 (紫)</option><option value="終末ブロック">終末ブロック</option><option value="その他">その他</option>
                </select>
                <div class="flex justify-end space-x-2 pt-2">
                    <button id="btn-close-add" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs">キャンセル</button>
                    <button id="btn-create-block" class="px-4 py-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-xs font-bold">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POS_COLORS = {
            "名詞": "bg-blue-600 border-blue-400 text-white", "代名詞": "bg-sky-500 border-sky-300 text-white",
            "形容詞": "bg-green-600 border-green-400 text-white", "副詞": "bg-emerald-800 border-emerald-600 text-white",
            "前置詞": "bg-orange-500 border-orange-400 text-white", "助動詞": "bg-red-600 border-red-400 text-white",
            "冠詞": "bg-yellow-500 border-yellow-300 text-gray-900", "疑問詞": "bg-purple-600 border-purple-400 text-white",
            "終末ブロック": "bg-gray-700 border-gray-500 text-gray-200", "その他": "bg-white border-gray-300 text-gray-900"
        };

        let state = { components: [], myBlocks: [] };
        let csvDatabase = {};
        let history = [];
        let historyIndex = -1;
        let draggingObj = null;
        let dragStartX = 0, dragStartY = 0;

        const container = document.getElementById('editor-container');
        const workspace = document.getElementById('editor-workspace');
        const genreSelect = document.getElementById('genre-select');
        const paletteContainer = document.getElementById('palette-container');
        const saveCodeArea = document.getElementById('save-code-area');

        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        window.onload = async function() {
            setupEventListeners();
            loadFromLocalStorage();
            await loadCSVFiles();
            updateGenreDropdown();
            updatePalette();
            renderWorkspace();
            saveHistory();
        };

        function saveHistory() {
            const current = JSON.stringify({ components: state.components });
            if (historyIndex >= 0 && history[historyIndex] === current) return;
            history = history.slice(0, historyIndex + 1).concat([current]);
            if (history.length > 50) history.shift(); else historyIndex++;
            updateUndoRedoButtons();
        }
        function undo() { if (historyIndex > 0) { historyIndex--; applyState(JSON.parse(history[historyIndex])); } }
        function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyState(JSON.parse(history[historyIndex])); } }
        function applyState(snap) { state.components = snap.components.map(c => ({ ...c })); renderWorkspace(); updateUndoRedoButtons(); }
        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyIndex <= 0;
            document.getElementById('btn-redo').disabled = historyIndex >= history.length - 1;
        }

        async function loadCSVFiles() {
            const csvFiles = ['csv1.csv', 'csv2.csv', 'csv3.csv'];
            for (const name of csvFiles) {
                try {
                    const res = await fetch('./csv/' + name); if (!res.ok) continue;
                    const text = await res.text();
                    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0); if (lines.length === 0) continue;
                    const genreName = lines[0].split(',')[0]; if (!csvDatabase[genreName]) csvDatabase[genreName] = [];
                    for (let i = 1; i < lines.length; i++) {
                        const p = lines[i].split(','); if (p.length >= 2) csvDatabase[genreName].push({ value: p[0].trim(), text: p[1].trim() });
                    }
                } catch (e) {}
            }
        }
        function updateGenreDropdown() {
            genreSelect.innerHTML = '<option value="myblocks">マイブロック</option>';
            Object.keys(csvDatabase).forEach(g => {
                const opt = document.createElement('option'); opt.value = g; opt.textContent = g; genreSelect.appendChild(opt);
            });
            if(Object.keys(csvDatabase).length > 0) genreSelect.value = Object.keys(csvDatabase)[0];
        }
        function updatePalette() {
            paletteContainer.innerHTML = '';
            const g = genreSelect.value;
            const blocks = (g === 'myblocks') ? state.myBlocks : (csvDatabase[g] || []);
            if (blocks.length === 0) { paletteContainer.innerHTML = `<div class="text-xs text-gray-500 p-2 text-center">空です</div>`; return; }
            blocks.forEach(b => {
                const el = document.createElement('div');
                el.className = `p-2 rounded border text-xs font-bold cursor-grab shadow ${POS_COLORS[b.value] || POS_COLORS['その他']}`;
                el.textContent = `${b.text} [${b.value}]`; el.draggable = true;
                el.ondragstart = (e) => e.dataTransfer.setData('blockStr', JSON.stringify(b));
                paletteContainer.appendChild(el);
            });
        }

        // --- ワークスペース描画 ---
        function renderWorkspace() {
            workspace.innerHTML = '';
            
            state.components.forEach(c => {
                c.width = Math.max(76, c.text.length * 10 + 24); 
            });

            let checkedIds = new Set();
            
            state.components.forEach(c => {
                if (checkedIds.has(c.id)) return;

                let rowBlocks = state.components.filter(other => Math.abs(other.y - c.y) < 15);
                rowBlocks.sort((a, b) => a.x - b.x);

                let currentGroup = [];
                for (let i = 0; i < rowBlocks.length; i++) {
                    if (currentGroup.length === 0) {
                        currentGroup.push(rowBlocks[i]);
                    } else {
                        let lastBlock = currentGroup[currentGroup.length - 1];
                        if (rowBlocks[i].x - (lastBlock.x + lastBlock.width) <= 15) {
                            currentGroup.push(rowBlocks[i]);
                        } else {
                            if (currentGroup.some(b => b.id === c.id)) break;
                            currentGroup = [rowBlocks[i]];
                        }
                    }
                }

                currentGroup.forEach((block, index) => {
                    checkedIds.add(block.id);

                    // 結合しているグループは隙間なく整列
                    if (currentGroup.length > 1 && index > 0) {
                        let prev = currentGroup[index - 1];
                        block.x = prev.x + prev.width;
                        block.y = prev.y;
                    }

                    const blockEl = document.createElement('div');
                    blockEl.id = block.id;
                    blockEl.style.left = block.x + 'px'; 
                    blockEl.style.top = block.y + 'px';
                    blockEl.style.width = block.width + 'px';
                    
                    let jointClass = "joint-none";
                    if (currentGroup.length > 1) {
                        if (index === 0) jointClass = "joint-left";
                        else if (index === currentGroup.length - 1) jointClass = "joint-right";
                        else jointClass = "joint-middle";
                    }

                    blockEl.className = `puzzle-block ${jointClass} ${POS_COLORS[block.value] || POS_COLORS['鎖その他']}`;
                    blockEl.textContent = block.text;

                    blockEl.onmousedown = (e) => {
                        const now = Date.now();
                        if (now - block.lastClick < 300) {
                            state.components = state.components.filter(item => item.id !== block.id);
                            saveHistory(); renderWorkspace(); draggingObj = null; return;
                        }
                        block.lastClick = now;
                        draggingObj = block;
                        dragStartX = e.clientX - block.x;
                        dragStartY = e.clientY - block.y;
                    };
                    workspace.appendChild(blockEl);
                });
            });
        }

        // --- ドッキング位置の判定・押し出し（手を離した時に1度だけ安全に実行） ---
        function handleSnapping(dragged) {
            let snapTarget = null;
            let minDistance = 50; 

            state.components.forEach(c => {
                if (c.id === dragged.id) return;

                const dY = Math.abs(dragged.y - c.y);
                if (dY < 30) {
                    // パターン1: 他のブロックの【右側】に近づけた場合
                    const distToRight = Math.abs(dragged.x - (c.x + c.width));
                    if (distToRight < minDistance) {
                        minDistance = distToRight;
                        snapTarget = { mode: 'after', target: c, x: c.x + c.width, y: c.y };
                    }
                    
                    // パターン2: 他のブロックの【左側】に近づけた場合
                    const distToLeft = Math.abs((dragged.x + dragged.width) - c.x);
                    if (distToLeft < minDistance) {
                        minDistance = distToLeft;
                        snapTarget = { mode: 'before', target: c, x: c.x - dragged.width, y: c.y };
                    }
                }
            });

            if (snapTarget) {
                const pushWidth = dragged.width;
                const targetX = snapTarget.x;
                
                // ドラッグ中ではなく、ここで初めて右側のブロック群を押し出す
                state.components.forEach(c => {
                    if (c.id !== dragged.id && Math.abs(c.y - snapTarget.y) < 15 && c.x >= targetX - 2) {
                        c.x += pushWidth;
                    }
                });

                dragged.x = snapTarget.x;
                dragged.y = snapTarget.y;
            }
        }

        function setupEventListeners() {
            genreSelect.onchange = updatePalette;
            container.ondragover = e => e.preventDefault();
            container.ondrop = e => {
                e.preventDefault();
                try {
                    const block = JSON.parse(e.dataTransfer.getData('blockStr'));
                    const rect = workspace.getBoundingClientRect();
                    state.components.push({
                        id: 'b' + Date.now() + Math.random().toString(36).substr(2, 4),
                        text: block.text, value: block.value,
                        x: e.clientX - rect.left - 45, y: e.clientY - rect.top - 20, lastClick: 0
                    });
                    saveHistory(); renderWorkspace();
                } catch(err){}
            };

            window.onmousemove = e => {
                if (draggingObj) {
                    // ドラッグ中は、他のブロックの位置に干渉せず純粋に移動させる
                    draggingObj.x = e.clientX - dragStartX;
                    draggingObj.y = e.clientY - dragStartY;
                    const el = document.getElementById(draggingObj.id);
                    if (el) {
                        el.style.left = draggingObj.x + 'px';
                        el.style.top = draggingObj.y + 'px';
                    }
                }
            };

            window.onmouseup = () => {
                if (draggingObj) {
                    // マウスを離した瞬間にのみ吸着と押し出し判定を行う（これでAが逃げるバグを完全解消）
                    handleSnapping(draggingObj); 
                    saveHistory();
                    renderWorkspace(); 
                    draggingObj = null;
                }
            };

            window.onkeydown = e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
                if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
            };
            document.getElementById('btn-undo').onclick = undo;
            document.getElementById('btn-redo').onclick = redo;
            document.getElementById('btn-save').onclick = () => { autoSaveToLocalStorage(); alert("保存しました"); };
            document.getElementById('btn-reset').onclick = () => { if(confirm("リセットしますか？")) { state.components = []; saveHistory(); renderWorkspace(); } };
            document.getElementById('btn-open-add').onclick = () => document.getElementById('modal-add').classList.remove('hidden');
            document.getElementById('btn-close-add').onclick = () => document.getElementById('modal-add').classList.add('hidden');
            document.getElementById('btn-create-block').onclick = () => {
                const t = document.getElementById('add-word').value.trim(); const v = document.getElementById('add-pos').value;
                if(!t) return alert("入力してください"); state.myBlocks.push({ text: t, value: v });
                autoSaveToLocalStorage(); genreSelect.value = 'myblocks'; updatePalette();
                document.getElementById('add-word').value = ''; document.getElementById('modal-add').classList.add('hidden');
            };
            document.getElementById('btn-export').onclick = () => { saveCodeArea.value = utoa(JSON.stringify({ components: state.components })); };
            document.getElementById('btn-import').onclick = () => { try { applyState(JSON.parse(atou(saveCodeArea.value.trim()))); saveHistory(); } catch(e) { alert("無効なコード"); } };
            document.getElementById('btn-open-media').onclick = async () => {
                const btn = document.getElementById('btn-open-media'); btn.innerText = "PROCESSING...";
                const canvas = await html2canvas(container, { backgroundColor: '#030712', scale: 2 });
                const link = document.createElement('a'); link.download = `lingoblock-${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
                btn.innerText = "IMAGE CAPTURE";
            };
        }

        function autoSaveToLocalStorage() {
            localStorage.setItem('lingo_snap_workspace4', JSON.stringify({ components: state.components }));
            localStorage.setItem('lingo_snap_myblocks4', JSON.stringify(state.myBlocks));
        }
        function loadFromLocalStorage() {
            const w = localStorage.getItem('lingo_snap_workspace4'); const m = localStorage.getItem('lingo_snap_myblocks4');
            if (w) { state.components = JSON.parse(w).components || []; } if (m) state.myBlocks = JSON.parse(m);
        }
    </script>
</body>
</html>
