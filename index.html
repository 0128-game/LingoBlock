<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoBlock - 横ドッキングエディタ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ドッキング位置のインジケータ（近づいた時に光るライン） */
        .drop-indicator {
            position: absolute; width: 4px; height: 36px; background: #38bdf8;
            box-shadow: 0 0 8px #38bdf8; border-radius: 2px; display: none; pointer-events: none; z-index: 40;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden h-screen w-screen flex flex-col">

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col p-4 z-50 overflow-y-auto no-scrollbar shadow-2xl">
            <h1 class="text-xl font-bold tracking-wider mb-4 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                LingoBlock
            </h1>

            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 mb-1">ジャンル選択</label>
                <select id="genre-select" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm focus:outline-none">
                    <option value="myblocks">マイブロック</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-undo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium disabled:opacity-30">UNDO (元に戻す)</button>
                <button id="btn-redo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium disabled:opacity-30">REDO (やり直す)</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-xs py-1.5 rounded font-medium col-span-2">ブラウザに保存 (LocalStorage)</button>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-open-media" class="bg-indigo-600 hover:bg-indigo-500 text-xs py-1.5 rounded font-medium">IMAGE CAPTURE</button>
                <button id="btn-open-add" class="bg-emerald-600 hover:bg-emerald-500 text-xs py-1.5 rounded font-medium">ブロック追加</button>
            </div>

            <div class="mb-4 border-t border-gray-700 pt-3">
                <label class="block text-xs font-semibold text-gray-400 mb-1">データコードエリア</label>
                <textarea id="save-code-area" class="w-full h-16 bg-gray-900 border border-gray-700 rounded p-1 text-xs font-mono resize-none focus:outline-none text-emerald-400" placeholder="コードがここに生成/展開されます..."></textarea>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button id="btn-export" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">SAVE CODE</button>
                    <button id="btn-import" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">LOAD CODE</button>
                </div>
                <button id="btn-reset" class="w-full bg-red-600 hover:bg-red-500 text-xs py-1 rounded mt-2 font-medium">ALL RESET (全消去)</button>
            </div>

            <div class="flex-1 border-t border-gray-700 pt-3 flex flex-col overflow-hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-2">パレット (ドラッグして配置)</label>
                <div id="palette-container" class="flex-1 overflow-y-auto space-y-2 p-1 bg-gray-900/50 rounded border border-gray-800/80 min-h-[150px]"></div>
            </div>
        </aside>

        <main class="flex-1 relative bg-gray-950 overflow-hidden" id="editor-container">
            <div id="drop-indicator" class="drop-indicator"></div>
            <div id="editor-workspace" class="absolute inset-0 origin-top-left touch-none" style="width: 3000px; height: 3000px; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 24px 24px;"></div>
        </main>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl w-80 shadow-2xl">
            <h3 class="text-base font-bold mb-4 text-emerald-400">✨ カスタムブロック追加</h3>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">英単語 / 記号</label>
                    <input type="text" id="add-word" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none" placeholder="example">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">品詞・役割選択</label>
                    <select id="add-pos" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none">
                        <option value="名詞">名詞 (青)</option>
                        <option value="代名詞">代名詞 (水色)</option>
                        <option value="形容詞">形容詞 (緑)</option>
                        <option value="副詞">副詞 (深緑)</option>
                        <option value="前置詞">前置詞 (オレンジ)</option>
                        <option value="助動詞">助動詞 (赤)</option>
                        <option value="冠詞">冠詞 (黄色)</option>
                        <option value="疑問詞">疑問詞 (紫)</option>
                        <option value="終末ブロック">終末ブロック (ダークグレー)</option>
                        <option value="その他">その他 (白)</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button id="btn-close-add" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs">キャンセル</button>
                    <button id="btn-create-block" class="px-4 py-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-xs font-bold">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POS_COLORS = {
            "名詞": "bg-blue-600 border-blue-400 text-white", "代名詞": "bg-sky-500 border-sky-300 text-white",
            "形容詞": "bg-green-600 border-green-400 text-white", "副詞": "bg-emerald-800 border-emerald-600 text-white",
            "前置詞": "bg-orange-500 border-orange-400 text-white", "助動詞": "bg-red-600 border-red-400 text-white",
            "冠詞": "bg-yellow-500 border-yellow-300 text-gray-900", "疑問詞": "bg-purple-600 border-purple-400 text-white",
            "終末ブロック": "bg-gray-700 border-gray-500 text-gray-200", "その他": "bg-white border-gray-300 text-gray-900"
        };

        let state = { components: [], myBlocks: [] };
        let csvDatabase = {};
        let history = [];
        let historyIndex = -1;
        let draggingObj = null;
        let snapTarget = null; // ドッキング対象の記録用

        const container = document.getElementById('editor-container');
        const workspace = document.getElementById('editor-workspace');
        const indicator = document.getElementById('drop-indicator');
        const genreSelect = document.getElementById('genre-select');
        const paletteContainer = document.getElementById('palette-container');
        const saveCodeArea = document.getElementById('save-code-area');

        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        window.onload = async function() {
            setupEventListeners();
            loadFromLocalStorage();
            await loadCSVFiles();
            updateGenreDropdown();
            updatePalette();
            renderWorkspace();
            saveHistory();
        };

        // --- 履歴システム ---
        function saveHistory() {
            const current = JSON.stringify({ components: state.components });
            if (historyIndex >= 0 && history[historyIndex] === current) return;
            history = history.slice(0, historyIndex + 1);
            history.push(current);
            if (history.length > 50) history.shift(); else historyIndex++;
            updateUndoRedoButtons();
        }

        function undo() { if (historyIndex > 0) { historyIndex--; applyState(JSON.parse(history[historyIndex])); } }
        function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyState(JSON.parse(history[historyIndex])); } }
        function applyState(snap) { state.components = snap.components.map(c => ({ ...c })); renderWorkspace(); updateUndoRedoButtons(); }
        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyIndex <= 0;
            document.getElementById('btn-redo').disabled = historyIndex >= history.length - 1;
        }

        // --- CSVデータ処理 ---
        async function loadCSVFiles() {
            const csvFiles = ['csv1.csv', 'csv2.csv', 'csv3.csv'];
            for (const name of csvFiles) {
                try {
                    const res = await fetch('./csv/' + name);
                    if (!res.ok) continue;
                    const text = await res.text();
                    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                    if (lines.length === 0) continue;
                    const genreName = lines[0].split(',')[0];
                    if (!csvDatabase[genreName]) csvDatabase[genreName] = [];
                    for (let i = 1; i < lines.length; i++) {
                        const p = lines[i].split(',');
                        if (p.length >= 2) csvDatabase[genreName].push({ value: p[0].trim(), text: p[1].trim() });
                    }
                } catch (e) {}
            }
        }

        function updateGenreDropdown() {
            genreSelect.innerHTML = '<option value="myblocks">マイブロック</option>';
            Object.keys(csvDatabase).forEach(g => {
                const opt = document.createElement('option'); opt.value = g; opt.textContent = g; genreSelect.appendChild(opt);
            });
            genreSelect.value = Object.keys(csvDatabase).length > 0 ? Object.keys(csvDatabase)[0] : 'myblocks';
        }

        function updatePalette() {
            paletteContainer.innerHTML = '';
            const g = genreSelect.value;
            const blocks = (g === 'myblocks') ? state.myBlocks : (csvDatabase[g] || []);
            if (blocks.length === 0) {
                paletteContainer.innerHTML = `<div class="text-xs text-gray-500 p-2 text-center">ブロックがありません</div>`;
                return;
            }
            blocks.forEach(b => {
                const el = document.createElement('div');
                el.className = `p-2 rounded border text-xs font-bold cursor-grab shadow ${POS_COLORS[b.value] || POS_COLORS['その他']}`;
                el.textContent = `${b.text} [${b.value}]`;
                el.draggable = true;
                el.ondragstart = (e) => e.dataTransfer.setData('blockStr', JSON.stringify(b));
                paletteContainer.appendChild(el);
            });
        }

// --- ワークスペースの描画（結合状態の可視化版） ---
        function renderWorkspace() {
            workspace.innerHTML = '';
            
            state.components.forEach(c => {
                const targetEl = document.getElementById(c.id);
                // 自身のブロックサイズ（未描画時はデフォルト100pxとする）
                const myWidth = targetEl ? targetEl.offsetWidth : 100;

                // 左隣、右隣にピッタリくっついているブロックがあるか探す（判定幅: 10px以内）
                const hasLeftNeighbor = state.components.some(other => 
                    other.id !== c.id && 
                    Math.abs(other.y - c.y) < 5 && 
                    Math.abs((other.x + (document.getElementById(other.id)?.offsetWidth || 100) + 6) - c.x) < 10
                );

                const hasRightNeighbor = state.components.some(other => 
                    other.id !== c.id && 
                    Math.abs(other.y - c.y) < 5 && 
                    Math.abs((c.x + myWidth + 6) - other.x) < 10
                );

                // 隣接状態に合わせて角の丸み（Tailwindクラス）を動的に切り替える
                let borderRoundClass = "rounded-md"; // 通常（左右どこにもくっついていない）
                if (hasLeftNeighbor && hasRightNeighbor) {
                    borderRoundClass = "rounded-none"; // 両側がくっついている（真ん中のブロック）
                } else if (hasLeftNeighbor) {
                    borderRoundClass = "rounded-r-md rounded-l-none border-l-0"; // 左側だけ結合（右端のブロック）
                } else if (hasRightNeighbor) {
                    borderRoundClass = "rounded-l-md rounded-r-none border-r-0"; // 右側だけ結合（左端のブロック）
                }

                // ブロック要素の作成
                const blockEl = document.createElement('div');
                blockEl.id = c.id;
                blockEl.style.left = c.x + 'px'; 
                blockEl.style.top = c.y + 'px';
                
                // 動的な丸みクラスと、結合時に少し浮き出るような陰影(shadow)をブレンド
                blockEl.className = `absolute flex items-center justify-center px-4 h-9 border shadow-md font-bold text-sm min-w-[70px] cursor-move transition-all duration-150 ${borderRoundClass} ${POS_COLORS[c.value] || POS_COLORS['その他']}`;
                blockEl.textContent = c.text;

                // Wクリックで削除
                blockEl.onmousedown = (e) => {
                    const now = Date.now();
                    if (now - c.lastClick < 300) {
                        state.components = state.components.filter(item => item.id !== c.id);
                        saveHistory(); renderWorkspace(); draggingObj = null; return;
                    }
                    c.lastClick = now;
                    draggingObj = c;
                    workspace.appendChild(blockEl);
                };
                workspace.appendChild(blockEl);
            });
        }
// --- ドッキング位置のリアルタイム判定ロジック（強化版） ---
        function checkSnapPositions(draggedObj) {
            const dragEl = document.getElementById(draggedObj.id);
            if (!dragEl) return null;

            const dragRect = dragEl.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            let closest = null;
            let minDistance = 50; // 反応する距離（px）

            state.components.forEach(c => {
                if (c.id === draggedObj.id) return;
                const targetEl = document.getElementById(c.id);
                if (!targetEl) return;

                const targetRect = targetEl.getBoundingClientRect();
                const distanceY = Math.abs(dragRect.top - targetRect.top);

                // 上下のズレが少ない場合のみ判定
                if (distanceY < 25) {
                    // パターン①：ターゲットの【右側】にドラッグ中のブロックを近づけた場合（Aの後ろにB）
                    const distRight = Math.abs(dragRect.left - targetRect.right);
                    if (distRight < minDistance) {
                        minDistance = distRight;
                        closest = {
                            type: 'insert-after',
                            target: c,
                            snapX: c.x + targetEl.offsetWidth + 6,
                            snapY: c.y,
                            indicatorX: targetRect.right + 3 - containerRect.left,
                            indicatorY: targetRect.top - containerRect.top
                        };
                    }

                    // パターン②：ターゲットの【左側】にドラッグ中のブロックを近づけた場合（Bの前にA / 割り込み）
                    const distLeft = Math.abs(dragRect.right - targetRect.left);
                    if (distLeft < minDistance) {
                        minDistance = distLeft;
                        closest = {
                            type: 'insert-before',
                            target: c,
                            snapX: c.x - dragEl.offsetWidth - 6,
                            snapY: c.y,
                            indicatorX: targetRect.left - 3 - containerRect.left,
                            indicatorY: targetRect.top - containerRect.top
                        };
                    }
                }
            });
            return closest;
        }

        // --- 連鎖的に後ろのブロックを押し出す処理 ---
        function shiftBlocksRight(startX, startY, shiftWidth) {
            // 同じ行（Y座標がほぼ同じ）で、挿入位置より右にあるブロックをすべて右にズラす
            state.components.forEach(c => {
                if (Math.abs(c.y - startY) < 10 && c.x >= startX) {
                    c.x += shiftWidth;
                    const el = document.getElementById(c.id);
                    if (el) el.style.left = c.x + 'px';
                }
            });
        }

        // --- イベント制御 ---
        function setupEventListeners() {
            genreSelect.onchange = updatePalette;

            container.ondragover = e => e.preventDefault();
            container.ondrop = e => {
                e.preventDefault();
                try {
                    const block = JSON.parse(e.dataTransfer.getData('blockStr'));
                    const rect = workspace.getBoundingClientRect();
                    state.components.push({
                        id: 'b' + Date.now() + Math.random().toString(36).substr(2, 4),
                        text: block.text, value: block.value,
                        x: e.clientX - rect.left - 45, y: e.clientY - rect.top - 18, lastClick: 0
                    });
                    saveHistory(); renderWorkspace();
                } catch(err){}
            };

            // マウス移動（ドラッグ中）
            window.onmousemove = e => {
                if (draggingObj) {
                    draggingObj.x += e.movementX;
                    draggingObj.y += e.movementY;
                    const el = document.getElementById(draggingObj.id);
                    if (el) {
                        el.style.left = draggingObj.x + 'px';
                        el.style.top = draggingObj.y + 'px';

                        // 吸着位置の判定
                        snapTarget = checkSnapPositions(draggingObj);
                        if (snapTarget) {
                            indicator.style.left = snapTarget.indicatorX + 'px';
                            indicator.style.top = snapTarget.indicatorY + 'px';
                            indicator.style.display = 'block';
                        } else {
                            indicator.style.display = 'none';
                        }
                    }
                }
            };

            // マウスを離した（ドッキング確定・割り込み処理）
            window.onmouseup = () => {
                if (draggingObj) {
                    if (snapTarget) {
                        const dragEl = document.getElementById(draggingObj.id);
                        const shiftWidth = dragEl ? dragEl.offsetWidth + 6 : 80;

                        if (snapTarget.type === 'insert-before') {
                            // 割り込み：ターゲットがある位置より右側のブロックを押し出す
                            shiftBlocksRight(snapTarget.target.x, snapTarget.target.y, shiftWidth);
                            draggingObj.x = snapTarget.target.x; // ターゲットの元あった位置に入る
                        } else if (snapTarget.type === 'insert-after') {
                            // 後ろにくっつける：ターゲットの右隣に元々ブロックがあったら押し出す
                            shiftBlocksRight(snapTarget.snapX, snapTarget.snapY, shiftWidth);
                            draggingObj.x = snapTarget.snapX;
                        }
                        
                        draggingObj.y = snapTarget.snapY;
                        
                        const el = document.getElementById(draggingObj.id);
                        if (el) {
                            el.style.left = draggingObj.x + 'px';
                            el.style.top = draggingObj.y + 'px';
                        }
                    }
                    indicator.style.display = 'none';
                    snapTarget = null;
                    saveHistory();
                    draggingObj = null;
                }
            };

            //（※残りのショートカットキーや各ボタンのクリックイベントは前のコードと同じです）
            window.onkeydown = e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
                if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
            };

            document.getElementById('btn-undo').onclick = undo;
            document.getElementById('btn-redo').onclick = redo;
            document.getElementById('btn-save').onclick = () => { autoSaveToLocalStorage(); alert("保存しました"); };
            document.getElementById('btn-reset').onclick = () => {
                if(confirm("全配置オブジェクトをリセットしますか？")) {
                    state.components = []; saveHistory(); renderWorkspace();
                }
            };

            document.getElementById('btn-open-add').onclick = () => document.getElementById('modal-add').classList.remove('hidden');
            document.getElementById('btn-close-add').onclick = () => document.getElementById('modal-add').classList.add('hidden');
            document.getElementById('btn-create-block').onclick = () => {
                const t = document.getElementById('add-word').value.trim();
                const v = document.getElementById('add-pos').value;
                if(!t) return alert("テキストを入力してください");
                state.myBlocks.push({ text: t, value: v });
                autoSaveToLocalStorage();
                genreSelect.value = 'myblocks';
                updatePalette();
                document.getElementById('add-word').value = '';
                document.getElementById('modal-add').classList.add('hidden');
            };

            document.getElementById('btn-export').onclick = () => {
                saveCodeArea.value = utoa(JSON.stringify({ components: state.components }));
            };
            document.getElementById('btn-import').onclick = () => {
                try {
                    const snap = JSON.parse(atou(saveCodeArea.value.trim()));
                    applyState(snap); saveHistory();
                } catch(e) { alert("不正なコードです。"); }
            };

            document.getElementById('btn-open-media').onclick = async () => {
                const btn = document.getElementById('btn-open-media');
                btn.innerText = "PROCESSING...";
                const canvas = await html2canvas(container, { backgroundColor: '#030712', scale: 2 });
                const link = document.createElement('a');
                link.download = `lingoblock-${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
                btn.innerText = "IMAGE CAPTURE";
            };
        }
        function autoSaveToLocalStorage() {
            localStorage.setItem('lingo_snap_workspace', JSON.stringify({ components: state.components }));
            localStorage.setItem('lingo_snap_myblocks', JSON.stringify(state.myBlocks));
        }

        function loadFromLocalStorage() {
            const w = localStorage.getItem('lingo_snap_workspace');
            const m = localStorage.getItem('lingo_snap_myblocks');
            if (w) { const p = JSON.parse(w); state.components = p.components || []; }
            if (m) state.myBlocks = JSON.parse(m);
        }
    </script>
</body>
</html>
