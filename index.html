<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoBlock - ライトテーマ完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* パズル風の凹凸結合デザイン用の共通スタイル */
        .puzzle-block {
            position: absolute;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.875rem;
            cursor: move;
            z-index: 20;
            box-shadow: 0 4px 10px -1px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* 結合状態に応じた角丸の制御 */
        .joint-none { border-radius: 8px; }
        .joint-left { border-radius: 8px 0 0 8px; border-right: none; }
        .joint-right { border-radius: 0 8px 8px 0; border-left: none; }
        .joint-middle { border-radius: 0; border-x: none; }

        /* ジョイント部分の凸（右側） */
        .joint-left::after, .joint-middle::after {
            content: ''; position: absolute; right: -6px; top: 12px;
            width: 12px; height: 16px; background: inherit;
            border: 2px solid rgba(255, 255, 255, 0.4); border-left: none;
            border-radius: 0 4px 4px 0; z-index: 30;
        }
        /* ジョイント部分の凹（左側） */
        .joint-right::before, .joint-middle::before {
            content: ''; position: absolute; left: -2px; top: 12px;
            width: 6px; height: 16px; 
            background: #f8fafc; 
            border: 2px solid rgba(255, 255, 255, 0.4); border-left: none;
            border-radius: 0 4px 4px 0; z-index: 25;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] font-sans overflow-hidden h-screen w-screen flex flex-col">

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col p-4 z-50 overflow-hidden shadow-lg">
            <h1 id="app-title" class="text-xl font-extrabold tracking-wider mb-3 text-center bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent cursor-pointer select-none">
                LingoBlock
            </h1>

            <div class="space-y-3 mb-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ブロックを検索 (全ジャンル横断)</label>
                    <input type="text" id="search-bar" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-700" placeholder="単語を入力...">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ジャンル選択</label>
                    <select id="genre-select" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-sm focus:outline-none text-slate-700">
                        <option value="myblocks">マイブロック</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">エディタ表示倍率 (<span id="zoom-level">100%</span>)</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button id="btn-zoom-out" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1 rounded font-bold">小 [-]</button>
                        <button id="btn-zoom-reset" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1 rounded font-semibold">等倍</button>
                        <button id="btn-zoom-in" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1 rounded font-bold">大 [+]</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-undo" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1.5 rounded font-semibold disabled:opacity-40">UNDO</button>
                    <button id="btn-redo" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1.5 rounded font-semibold disabled:opacity-40">REDO</button>
                </div>
            </div>

            <div class="border border-slate-200 rounded-lg mb-4 overflow-hidden bg-slate-50/50">
                <button id="btn-toggle-menu" class="w-full px-3 py-2 flex justify-between items-center text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 border-b border-slate-200 select-none transition-all">
                    <span>⚙️ 拡張メニュー (ブロック追加・保存など)</span>
                    <span id="accordion-arrow" class="transition-transform duration-200 rotate-0">▼</span>
                </button>
                
                <div id="accordion-content" class="hidden p-3 space-y-3 bg-white border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-open-media" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs py-1.5 rounded font-bold border border-indigo-200">IMAGE CAPTURE</button>
                        <button id="btn-open-add" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs py-1.5 rounded font-bold border border-emerald-200">ブロック追加</button>
                    </div>

                    <div class="border-t border-slate-100 pt-2">
                        <label class="block text-[11px] font-bold text-slate-400 mb-1">データコードエリア</label>
                        <textarea id="save-code-area" class="w-full h-12 bg-slate-50 border border-slate-200 rounded p-1 text-xs font-mono resize-none focus:outline-none text-blue-600" placeholder="コード..."></textarea>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button id="btn-export" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1 rounded font-medium">SAVE CODE</button>
                            <button id="btn-import" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-1 rounded font-medium">LOAD CODE</button>
                        </div>
                    </div>
                    
                    <button id="btn-reset" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 text-xs py-1.5 rounded font-bold">ALL RESET (全消去)</button>
                </div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden border-t border-slate-100 pt-2">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-slate-500">パレット (配置:ドラッグ / 抹消:Wクリック)</label>
                    <span id="word-count" class="text-[11px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-full">全 0 件</span>
                </div>
                <div id="palette-container" class="flex-1 overflow-y-auto space-y-2 p-1 bg-slate-50 rounded border border-slate-100 min-h-[150px]"></div>
            </div>
        </aside>

        <main class="flex-1 relative bg-[#f8fafc] overflow-hidden" id="editor-container">
            <div id="editor-workspace" class="absolute inset-0 origin-top-left touch-none transition-transform duration-100" style="width: 3000px; height: 3000px; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 24px 24px;"></div>
        </main>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white border border-slate-200 p-6 rounded-xl w-80 shadow-2xl">
            <h3 class="text-base font-bold mb-4 text-[#3ecf8e]">✨ カスタムブロック追加</h3>
            <div class="space-y-3 text-sm">
                <input type="text" id="add-word" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-slate-800 focus:outline-none" placeholder="example">
                <select id="add-pos" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-slate-800 focus:outline-none">
                    <option value="動詞">動詞 (赤)</option>
                    <option value="名詞">名詞 (青)</option>
                    <option value="代名詞">代名詞 (水色)</option>
                    <option value="形容詞">形容詞 (緑)</option>
                    <option value="副詞">副詞 (深緑)</option>
                    <option value="前置詞">前置詞 (オレンジ)</option>
                    <option value="助動詞">助動詞 (ローズ)</option>
                    <option value="冠詞">冠詞 (黄色)</option>
                    <option value="疑問詞">疑問詞 (紫)</option>
                    <option value="終末ブロック">終末ブロック (グレー)</option>
                    <option value="その他">その他</option>
                </select>
                <div class="flex justify-end space-x-2 pt-2">
                    <button id="btn-close-add" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs rounded font-medium">キャンセル</button>
                    <button id="btn-create-block" class="px-4 py-1 bg-[#3ecf8e] text-white rounded text-xs font-bold shadow-sm">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POS_COLORS = {
            "動詞": "bg-red-500 text-white", 
            "名詞": "bg-blue-500 text-white", "代名詞": "bg-sky-400 text-white",
            "形容詞": "bg-emerald-500 text-white", "副詞": "bg-teal-600 text-white",
            "前置詞": "bg-orange-400 text-white", "助動詞": "bg-rose-500 text-white",
            "冠詞": "bg-amber-400 text-amber-950", "疑問詞": "bg-violet-500 text-white",
            "終末ブロック": "bg-slate-400 text-white", "other": "bg-slate-200 text-slate-800", "その他": "bg-slate-200 text-slate-800"
        };

        let state = { components: [], myBlocks: [] };
        let csvDatabase = {};
        let history = [];
        let historyIndex = -1;
        
        let draggingObj = null;
        let dragStartX = 0, dragStartY = 0;
        let initialRowBlocks = [];

        let titleClickCount = 0;
        let titleClickTimer = null;

        // 🛠️ 追加: ズーム倍率の管理変数
        let zoomScale = 1.0;

        const container = document.getElementById('editor-container');
        const workspace = document.getElementById('editor-workspace');
        const genreSelect = document.getElementById('genre-select');
        const paletteContainer = document.getElementById('palette-container');
        const saveCodeArea = document.getElementById('save-code-area');
        const searchBar = document.getElementById('search-bar');
        const wordCountEl = document.getElementById('word-count'); // 🛠️ 追加

        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        window.onload = async function() {
            setupEventListeners();
            loadFromLocalStorage();
            await loadCSVFiles();
            updateGenreDropdown();
            updatePalette();
            renderWorkspace();
            saveHistory();
        };

        function saveHistory() {
            const current = JSON.stringify({ components: state.components });
            if (historyIndex >= 0 && history[historyIndex] === current) return;
            history = history.slice(0, historyIndex + 1).concat([current]);
            if (history.length > 50) history.shift(); else historyIndex++;
            updateUndoRedoButtons();
            autoSaveToLocalStorage();
        }
        function undo() { if (historyIndex > 0) { historyIndex--; applyState(JSON.parse(history[historyIndex])); } }
        function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyState(JSON.parse(history[historyIndex])); } }
        function applyState(snap) { state.components = snap.components.map(c => ({ ...c })); renderWorkspace(); updateUndoRedoButtons(); autoSaveToLocalStorage(); }
        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyIndex <= 0;
            document.getElementById('btn-redo').disabled = historyIndex >= history.length - 1;
        }

        // 🛠️ 変更: 1から順にループし、ファイルが無い(404等)時点でbreakするよう修正
        async function loadCSVFiles() {
            let i = 1;
            while (true) {
                const name = `csv${i}.csv`;
                try {
                    const res = await fetch('./csv/' + name);
                    if (!res.ok) break; // ファイルがなくなったら終了
                    
                    const text = await res.text();
                    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                    if (lines.length === 0) { i++; continue; }
                    
                    const genreName = lines[0].split(',')[0];
                    if (!csvDatabase[genreName]) csvDatabase[genreName] = [];
                    for (let j = 1; j < lines.length; j++) {
                        const p = lines[j].split(',');
                        if (p.length >= 2) csvDatabase[genreName].push({ value: p[0].trim(), text: p[1].trim() });
                    }
                } catch (e) {
                    break; // 通信エラー等の場合も終了
                }
                i++;
            }
        }

        function updateGenreDropdown() {
            genreSelect.innerHTML = '<option value="myblocks">マイブロック</option>';
            Object.keys(csvDatabase).forEach(g => {
                const opt = document.createElement('option'); opt.value = g; opt.textContent = g; genreSelect.appendChild(opt);
            });
            if(Object.keys(csvDatabase).length > 0) genreSelect.value = Object.keys(csvDatabase)[0];
        }
        
        function updatePalette() {
            paletteContainer.innerHTML = '';
            const query = searchBar.value.trim().toLowerCase();
            
            let blocks = [];
            let isSearching = query.length > 0;

            if (isSearching) {
                state.myBlocks.forEach(b => {
                    if (b.text.toLowerCase().includes(query)) {
                        blocks.push({ ...b, fromMyBlocks: true, originalRef: b });
                    }
                });
                Object.keys(csvDatabase).forEach(genre => {
                    csvDatabase[genre].forEach(b => {
                        if (b.text.toLowerCase().includes(query)) {
                            blocks.push({ ...b, fromMyBlocks: false, genreName: genre });
                        }
                    });
                });
            } else {
                const g = genreSelect.value;
                const targetSrc = (g === 'myblocks') ? state.myBlocks : (csvDatabase[g] || []);
                blocks = targetSrc.map(b => ({ ...b, fromMyBlocks: (g === 'myblocks'), genreName: g, originalRef: b }));
            }

            // 🛠️ 追加: 単語数のバッジ表示を更新
            wordCountEl.textContent = `全 ${blocks.length} 件`;

            if (blocks.length === 0) {
                if (isSearching) {
                    paletteContainer.innerHTML = `
                        <div class="text-xs text-slate-400 p-2 text-center">一致するブロックがありません</div>
                        <button id="btn-suggest-create" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs py-2 rounded font-bold border border-emerald-200 mt-1 transition-all">
                            ✨ "${searchBar.value.trim()}" を新規作成
                        </button>
                    `;
                    document.getElementById('btn-suggest-create').onclick = () => {
                        document.getElementById('add-word').value = searchBar.value.trim();
                        document.getElementById('modal-add').classList.remove('hidden');
                    };
                } else {
                    paletteContainer.innerHTML = `<div class="text-xs text-slate-400 p-2 text-center">空です</div>`;
                }
                return;
            }

            blocks.forEach((b) => {
                const el = document.createElement('div');
                el.className = `p-2 rounded border border-slate-200 text-xs font-bold cursor-grab shadow-sm select-none ${POS_COLORS[b.value] || POS_COLORS['その他']}`;
                
                const badge = (isSearching) ? ` <span class="opacity-60 text-[9px] font-normal">[${b.fromMyBlocks ? 'マイ' : b.genreName}]</span>` : '';
                el.innerHTML = `${b.text} [${b.value}]${badge}`;
                el.draggable = true;
                
                el.ondragstart = (e) => e.dataTransfer.setData('blockStr', JSON.stringify({ text: b.text, value: b.value }));
                
                el.ondblclick = () => {
                    if (b.fromMyBlocks) {
                        const targetIdx = state.myBlocks.indexOf(b.originalRef);
                        if (targetIdx !== -1) state.myBlocks.splice(targetIdx, 1);
                        updatePalette();
                        const beforeLength = state.components.length;
                        state.components = state.components.filter(c => !(c.text === b.text && c.value === b.value));
                        autoSaveToLocalStorage();
                        if (state.components.length !== beforeLength) { saveHistory(); renderWorkspace(); }
                    } else {
                        alert(`「${b.genreName}」の標準ブロックはパレットから削除できません。`);
                    }
                };
                paletteContainer.appendChild(el);
            });
        }

        // 🛠️ 追加: ズーム表示を適用する関数
        function applyZoom() {
            workspace.style.transform = `scale(${zoomScale})`;
            document.getElementById('zoom-level').textContent = `${Math.round(zoomScale * 100)}%`;
        }

        function renderWorkspace() {
            workspace.innerHTML = '';
            state.components.forEach(c => { c.width = Math.max(76, c.text.length * 10 + 24); });
            let checkedIds = new Set();
            
            state.components.forEach(c => {
                if (checkedIds.has(c.id)) return;
                let rowBlocks = state.components.filter(other => Math.abs(other.y - c.y) < 15);
                rowBlocks.sort((a, b) => a.x - b.x);

                let currentGroup = [];
                for (let i = 0; i < rowBlocks.length; i++) {
                    if (currentGroup.length === 0) { currentGroup.push(rowBlocks[i]); } else {
                        let lastBlock = currentGroup[currentGroup.length - 1];
                        if (rowBlocks[i].x - (lastBlock.x + lastBlock.width) <= 15) { currentGroup.push(rowBlocks[i]); } else {
                            if (currentGroup.some(b => b.id === c.id)) break; currentGroup = [rowBlocks[i]];
                        }
                    }
                }

                currentGroup.forEach((block, index) => {
                    checkedIds.add(block.id);
                    if (currentGroup.length > 1 && index > 0) {
                        let prev = currentGroup[index - 1]; block.x = prev.x + prev.width; block.y = prev.y;
                    }
                    const blockEl = document.createElement('div');
                    blockEl.id = block.id; blockEl.style.left = block.x + 'px'; blockEl.style.top = block.y + 'px'; blockEl.style.width = block.width + 'px';
                    
                    let jointClass = "joint-none";
                    if (currentGroup.length > 1) {
                        if (index === 0) jointClass = "joint-left";
                        else if (index === currentGroup.length - 1) jointClass = "joint-right";
                        else jointClass = "joint-middle";
                    }

                    blockEl.className = `puzzle-block ${jointClass} ${POS_COLORS[block.value] || POS_COLORS['その他']}`;
                    blockEl.textContent = block.text;

                    blockEl.onmousedown = (e) => {
                        const now = Date.now();
                        if (now - block.lastClick < 300) {
                            state.components = state.components.filter(item => item.id !== block.id);
                            saveHistory(); renderWorkspace(); draggingObj = null; return;
                        }
                        block.lastClick = now; draggingObj = block;
                        
                        // 🛠️ 修正: ズーム倍率を考慮したドラッグ計算
                        dragStartX = (e.clientX / zoomScale) - block.x; 
                        dragStartY = (e.clientY / zoomScale) - block.y;
                        
                        initialRowBlocks = [];
                        let followers = currentGroup.slice(index + 1);
                        followers.forEach(f => { initialRowBlocks.push({ obj: f, offsetX: f.x - block.x, offsetY: f.y - block.y }); });
                    };
                    workspace.appendChild(blockEl);
                });
            });
        }

        function handleSnapping(p) {
            let q = null; let minDistance = 60;
            state.components.forEach(c => {
                if (c.id === p.id) return;
                const dY = Math.abs(p.y - c.y);
                if (dY < 30) {
                    const distToLeft = Math.abs((p.x + p.width) - c.x); const distToRight = Math.abs(p.x - (c.width + c.x));
                    const currentDist = Math.min(distToLeft, distToRight); if (currentDist < minDistance) { minDistance = currentDist; q = c; }
                }
            });
            if (q) {
                const shiftWidth = p.width;
                if (p.x < q.x) {
                    const originalQx = q.x;
                    state.components.forEach(c => { if (c.id !== p.id && c.id !== q.id && Math.abs(c.y - q.y) < 15 && c.x > originalQx) c.x += shiftWidth; });
                    q.x = originalQx + shiftWidth; q.y = p.y; p.x = originalQx; p.y = q.y;
                } else {
                    const insertX = q.x + q.width;
                    state.components.forEach(c => { if (c.id !== p.id && Math.abs(c.y - q.y) < 15 && c.x >= insertX - 2) c.x += shiftWidth; });
                    p.x = insertX; p.y = q.y;
                }
            }
        }

        function setupEventListeners() {
            const btnToggleMenu = document.getElementById('btn-toggle-menu');
            const accordionContent = document.getElementById('accordion-content');
            const accordionArrow = document.getElementById('accordion-arrow');

            btnToggleMenu.onclick = () => {
                const isHidden = accordionContent.classList.contains('hidden');
                if (isHidden) {
                    accordionContent.classList.remove('hidden');
                    accordionArrow.textContent = '▲';
                } else {
                    accordionContent.classList.add('hidden');
                    accordionArrow.textContent = '▼';
                }
            };

            // 🛠️ 追加: ズームボタンのイベント設定
            document.getElementById('btn-zoom-in').onclick = () => { if (zoomScale < 2.0) { zoomScale += 0.1; applyZoom(); } };
            document.getElementById('btn-zoom-out').onclick = () => { if (zoomScale > 0.5) { zoomScale -= 0.1; applyZoom(); } };
            document.getElementById('btn-zoom-reset').onclick = () => { zoomScale = 1.0; applyZoom(); };

            genreSelect.onchange = () => { searchBar.value = ''; updatePalette(); };
            searchBar.oninput = updatePalette;

            container.ondragover = e => e.preventDefault();
            container.ondrop = e => {
                e.preventDefault();
                try {
                    const block = JSON.parse(e.dataTransfer.getData('blockStr'));
                    const rect = workspace.getBoundingClientRect();
                    // 🛠️ 修正: ドロップ位置もズーム倍率で補正
                    state.components.push({
                        id: 'b' + Date.now() + Math.random().toString(36).substr(2, 4),
                        text: block.text, value: block.value,
                        x: (e.clientX - rect.left) / zoomScale - 45, y: (e.clientY - rect.top) / zoomScale - 20, lastClick: 0
                    });
                    saveHistory(); renderWorkspace();
                } catch(err){}
            };

            window.onmousemove = e => {
                if (draggingObj) {
                    // 🛠️ 修正: 移動量計算をズーム倍率で補正
                    draggingObj.x = (e.clientX / zoomScale) - dragStartX;
                    draggingObj.y = (e.clientY / zoomScale) - dragStartY;
                    
                    const el = document.getElementById(draggingObj.id);
                    if (el) { el.style.left = draggingObj.x + 'px'; el.style.top = draggingObj.y + 'px'; }
                    if (e.shiftKey) {
                        initialRowBlocks.forEach(f => {
                            f.obj.x = draggingObj.x + f.offsetX; f.obj.y = draggingObj.y + f.offsetY;
                            const fel = document.getElementById(f.obj.id); if (fel) { fel.style.left = f.obj.x + 'px'; fel.style.top = f.obj.y + 'px'; }
                        });
                    }
                }
            };

            window.onmouseup = () => { if (draggingObj) { handleSnapping(draggingObj); initialRowBlocks = []; saveHistory(); renderWorkspace(); draggingObj = null; } };
            window.onkeydown = e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
                if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
            };

            document.getElementById('app-title').onclick = () => {
                titleClickCount++; clearTimeout(titleClickTimer);
                titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 500);
                if (titleClickCount === 3) { titleClickCount = 0; window.open('https://0128-game.github.io/Lingoblock-CSVmaker/', '_blank'); }
            };

            document.getElementById('btn-undo').onclick = undo;
            document.getElementById('btn-redo').onclick = redo;
            document.getElementById('btn-reset').onclick = () => { if(confirm("リセットしますか？")) { state.components = []; saveHistory(); renderWorkspace(); } };
            document.getElementById('btn-open-add').onclick = () => document.getElementById('modal-add').classList.remove('hidden');
            document.getElementById('btn-close-add').onclick = () => document.getElementById('modal-add').classList.add('hidden');
            document.getElementById('btn-create-block').onclick = () => {
                const t = document.getElementById('add-word').value.trim(); const v = document.getElementById('add-pos').value;
                if(!t) return alert("入力してください"); state.myBlocks.push({ text: t, value: v });
                autoSaveToLocalStorage(); searchBar.value = ''; genreSelect.value = 'myblocks'; updatePalette();
                document.getElementById('add-word').value = ''; document.getElementById('modal-add').classList.add('hidden');
            };
            document.getElementById('btn-export').onclick = () => { saveCodeArea.value = utoa(JSON.stringify({ components: state.components })); };
            document.getElementById('btn-import').onclick = () => { try { applyState(JSON.parse(atou(saveCodeArea.value.trim()))); saveHistory(); } catch(e) { alert("無効なコード"); } };
            document.getElementById('btn-open-media').onclick = async () => {
                const btn = document.getElementById('btn-open-media'); btn.innerText = "PROCESSING...";
                const canvas = await html2canvas(container, { backgroundColor: '#f8fafc', scale: 2 });
                const link = document.createElement('a'); link.download = `lingoblock-${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
                btn.innerText = "IMAGE CAPTURE";
            };
        }

        function autoSaveToLocalStorage() {
            localStorage.setItem('lingo_snap_workspace_light', JSON.stringify({ components: state.components }));
            localStorage.setItem('lingo_snap_myblocks_light', JSON.stringify(state.myBlocks));
        }
        function loadFromLocalStorage() {
            const w = localStorage.getItem('lingo_snap_workspace_light'); const m = localStorage.getItem('lingo_snap_myblocks_light');
            if (w) { state.components = JSON.parse(w).components || []; } if (m) state.myBlocks = JSON.parse(m);
        }
    </script>
</body>
</html>
