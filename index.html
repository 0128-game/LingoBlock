<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語構成ビジュアルエディタ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 接続線のコンテナがエディタ内に収まるように調整 */
        .leader-line { z-index: 40; pointer-events: auto !important; cursor: pointer; }
        .port { transition: transform 0.1s; }
        .port:hover { transform: scale(1.3); }
        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden h-screen w-screen flex flex-col select-none">

    <div class="flex flex-1 overflow-hidden relative">

        <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col p-4 z-50 overflow-y-auto no-scrollbar shadow-2xl">
            <h1 class="text-xl font-bold tracking-wider mb-4 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                ENG-BLOCK EDITOR
            </h1>

            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 mb-1">ジャンル選択</label>
                <select id="genre-select" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                    <option value="myblocks">マイブロック</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-undo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium transition">元に戻す</button>
                <button id="btn-redo" class="bg-gray-700 hover:bg-gray-600 text-xs py-1.5 rounded font-medium transition">やり直す</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-xs py-1.5 rounded font-medium transition col-span-2">手動保存 (LocalStorage)</button>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="btn-open-media" class="bg-indigo-600 hover:bg-indigo-500 text-xs py-1.5 rounded font-medium transition">スクショ・録画</button>
                <button id="btn-open-add" class="bg-emerald-600 hover:bg-emerald-500 text-xs py-1.5 rounded font-medium transition">ブロック追加</button>
            </div>

            <div class="mb-4 border-t border-gray-700 pt-3">
                <label class="block text-xs font-semibold text-gray-400 mb-1">データ書き出し欄</label>
                <textarea id="save-code-area" class="w-full h-16 bg-gray-900 border border-gray-700 rounded p-1 text-xs font-mono resize-none focus:outline-none focus:border-blue-500 text-gray-300" placeholder="エンコードデータ"></textarea>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button id="btn-export" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">書き出し</button>
                    <button id="btn-import" class="bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded">読み込み</button>
                </div>
            </div>

            <button id="btn-stop-record" class="hidden w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded mb-4 animate-pulse text-sm">
                ■ 録画を停止して保存
            </button>

            <div class="flex-1 border-t border-gray-700 pt-3 flex flex-col overflow-hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-2">パレット (ドラッグして右へ配置)</label>
                <div id="palette-container" class="flex-1 overflow-y-auto space-y-2 p-1 bg-gray-900/50 rounded border border-gray-800/80 min-h-[150px]">
                    </div>
            </div>
        </aside>

        <main class="flex-1 relative bg-gray-950 overflow-hidden" id="editor-container">
            
            <div id="editor-workspace" class="absolute inset-0 origin-top-left touch-none" style="width: 5000px; height: 5000px; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 24px 24px;">
                </div>

            <div class="absolute top-4 right-4 z-40 bg-gray-800/80 backdrop-blur border border-gray-700 px-3 py-1.5 rounded-lg flex items-center space-x-3 text-sm shadow-lg">
                <button id="btn-zoom-out" class="font-bold hover:text-blue-400 px-1">－</button>
                <span id="zoom-display" class="font-mono text-xs w-10 text-center">100%</span>
                <button id="btn-zoom-in" class="font-bold hover:text-blue-400 px-1">＋</button>
            </div>
        </main>
    </div>

    <div id="modal-media" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl w-80 shadow-2xl">
            <h3 class="text-base font-bold mb-4 flex items-center text-indigo-400">📷 スクショ・録画設定</h3>
            <div class="space-y-4 text-sm">
                <div>
                    <span class="block text-xs text-gray-400 mb-1">出力モード</span>
                    <label class="inline-flex items-center mr-4"><input type="radio" name="media-type" value="screenshot" checked class="mr-1 text-indigo-600"> スクショ</label>
                    <label class="inline-flex items-center"><input type="radio" name="media-type" value="record" class="mr-1 text-indigo-600"> 録画 (WebM)</label>
                </div>
                <div>
                    <span class="block text-xs text-gray-400 mb-1">キャプチャ範囲</span>
                    <select id="media-range" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1">
                        <option value="all">全体 (画面全体)</option>
                        <option value="editor">エディタのみ</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button id="btn-close-media" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs">キャンセル</button>
                    <button id="btn-start-media" class="px-4 py-1 bg-indigo-600 hover:bg-indigo-500 text-white rounded text-xs font-bold">開始</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl w-80 shadow-2xl">
            <h3 class="text-base font-bold mb-4 text-emerald-400">✨ カスタムブロック追加</h3>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">英単語 / 記号</label>
                    <input type="text" id="add-word" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-emerald-500" placeholder="example">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">品詞・役割選択</label>
                    <select id="add-pos" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white focus:outline-none focus:border-emerald-500">
                        <option value="名詞">名詞 (青)</option>
                        <option value="代名詞">代名詞 (水色)</option>
                        <option value="形容詞">形容詞 (緑)</option>
                        <option value="副詞">副詞 (深緑)</option>
                        <option value="前置詞">前置詞 (オレンジ)</option>
                        <option value="助動詞">助動詞 (赤)</option>
                        <option value="冠詞">冠詞 (黄色)</option>
                        <option value="疑問詞">疑問詞 (紫)</option>
                        <option value="終末ブロック">終末ブロック (ダークグレー)</option>
                        <option value="その他">その他 (白)</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button id="btn-close-add" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs">キャンセル</button>
                    <button id="btn-create-block" class="px-4 py-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-xs font-bold">追加</button>
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu" class="hidden absolute z-[200] bg-gray-800 border border-gray-700 rounded shadow-xl py-1 text-xs w-28">
        <button id="btn-ctx-delete" class="w-full text-left px-3 py-1.5 hover:bg-red-600 text-red-200 transition">削除する</button>
    </div>

    <script>
        // LeaderLineはESMや通常の読み込みで微調整が必要なため、一度マジックパッチを適用して読み込みます
        window.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/border-box.min.js"; 
            script.onload = () => { window.LeaderLineScriptLoaded = true; initApp(); };
            document.head.appendChild(script);
        });
    </script>

    <script>
        // --- カラーマッピング定義 ---
        const POS_COLORS = {
            "名詞": "bg-blue-600 border-blue-400 text-white",
            "代名詞": "bg-sky-500 border-sky-300 text-white",
            "形容詞": "bg-green-600 border-green-400 text-white",
            "副詞": "bg-emerald-800 border-emerald-600 text-white",
            "前置詞": "bg-orange-500 border-orange-400 text-white",
            "助動詞": "bg-red-600 border-red-400 text-white",
            "冠詞": "bg-yellow-500 border-yellow-300 text-gray-900",
            "疑問詞": "bg-purple-600 border-purple-400 text-white",
            "終末ブロック": "bg-gray-700 border-gray-500 text-gray-200",
            "その他": "bg-white border-gray-300 text-gray-900"
        };

        // --- アプリケーション状態 ---
        let state = {
            components: [], // エディタ上のブロック情報 { id, type, x, y, text, value(品詞) }
            wires: [],      // 接続線情報 { id, from: { blockId, port }, to: { blockId, port } }
            myBlocks: []    // ユーザー作成カスタムブロック { text, value }
        };
        
        let csvDatabase = {}; // ジャンル名 -> [ {text, value}, ... ]
        let history = [];
        let historyIndex = -1;
        let zoom = 1.0;
        let activeLineRenderers = {}; // id -> LeaderLineインスタンス
        let selectedPort = null;     // 端子結線用の一時選択キャッシュ { blockId, port, element }
        let rightClickedTargetId = null; // 右クリックしたブロックのID退避用
        let mediaRecorder = null;
        let recordedChunks = [];

        // DOM要素
        const editorContainer = document.getElementById('editor-container');
        const editorWorkspace = document.getElementById('editor-workspace');
        const genreSelect = document.getElementById('genre-select');
        const paletteContainer = document.getElementById('palette-container');
        const zoomDisplay = document.getElementById('zoom-display');
        const saveCodeArea = document.getElementById('save-code-area');
        const contextMenu = document.getElementById('context-menu');

        // --- Base64 ユーティリティ (仕様準拠) ---
        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        // --- アプリ初期化 ---
        async function initApp() {
            setupEventListeners();
            await loadCSVFiles();
            loadFromLocalStorage();
            updatePalette();
            renderWorkspace();
            saveHistory();
        }

        // --- CSV自動シーケンシャルFetch ---
        async function loadCSVFiles() {
            let index = 1;
            const origin = window.location.origin + window.location.pathname;
            const rootPath = origin.substring(0, origin.lastIndexOf('/'));
            
            while (true) {
                // 絶対パスを構築
                const csvUrl = `${rootPath}/csv/csv${index}.csv`;
                try {
                    const response = await fetch(csvUrl);
                    if (!response.ok) break; // 404等で終了
                    const text = await response.text();
                    parseCSV(text);
                    index++;
                } catch (e) {
                    console.warn(`CSV fetch finished or blocked at sequence: ${index}`, e);
                    break;
                }
            }
            updateGenreDropdown();
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length === 0) return;

            // 1行目: ジャンル名,ブロック数
            const firstLine = lines[0].split(',');
            const genreName = firstLine[0];
            
            if(!csvDatabase[genreName]) csvDatabase[genreName] = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 2) {
                    csvDatabase[genreName].push({
                        value: parts[0].trim(), // 品詞
                        text: parts[1].trim()   // 単語
                    });
                }
            }
        }

        function updateGenreDropdown() {
            // 初期化
            genreSelect.innerHTML = '<option value="myblocks">マイブロック</option>';
            Object.keys(csvDatabase).forEach(genre => {
                const opt = document.createElement('option');
                opt.value = genre;
                opt.textContent = genre;
                genreSelect.appendChild(opt);
            });
            genreSelect.value = Object.keys(csvDatabase)[0] || 'myblocks';
            updatePalette();
        }

        // --- パレットUI更新 ---
        function updatePalette() {
            paletteContainer.innerHTML = '';
            const selectedGenre = genreSelect.value;
            let blocks = [];

            if (selectedGenre === 'myblocks') {
                blocks = state.myBlocks;
            } else {
                blocks = csvDatabase[selectedGenre] || [];
            }

            if(blocks.length === 0) {
                paletteContainer.innerHTML = `<div class="text-xs text-gray-500 p-2 text-center">ブロックがありません</div>`;
                return;
            }

            blocks.forEach((b, i) => {
                const el = document.createElement('div');
                el.className = `p-2 rounded border text-xs font-bold cursor-grab shadow select-none ${POS_COLORS[b.value] || POS_COLORS['その他']}`;
                el.textContent = `${b.text} (${b.value})`;
                el.draggable = true;
                
                // ドラッグデータセット
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', JSON.stringify(b));
                });
                paletteContainer.appendChild(el);
            });
        }

        // --- ワークスペースの描画 (ブロック＆ワイヤー同期) ---
        function renderWorkspace() {
            // 既存の線をすべて削除
            Object.values(activeLineRenderers).forEach(line => line.remove());
            activeLineRenderers = {};
            
            // ワークスペース内をクリア
            editorWorkspace.innerHTML = '';

            // ブロックの配置
            state.components.forEach(c => {
                const isTerminal = ["終末ブロック", "ピリオド", "クエスチョンマーク", "エクスクラメーションマーク"].includes(c.value) || [".", "?", "!"].includes(c.text);
                
                const blockEl = document.createElement('div');
                blockEl.id = c.id;
                blockEl.style.left = `${c.x}px`;
                blockEl.style.top = `${c.y}px`;
                blockEl.className = `absolute flex items-center justify-between px-2 py-1.5 rounded-lg border shadow-lg font-bold text-sm min-w-[90px] cursor-move transition-shadow hover:shadow-2xl ${POS_COLORS[c.value] || POS_COLORS['その他']}`;
                
                // A端子 (前方)
                const portA = document.createElement('div');
                portA.dataset.port = 'A';
                portA.className = "port absolute left-0 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white border-2 border-gray-800 cursor-pointer z-10 shadow";
                blockEl.appendChild(portA);

                // テキスト表示
                const label = document.createElement('span');
                label.className = "mx-auto px-2 pointer-events-none select-none text-center w-full";
                label.textContent = c.text;
                blockEl.appendChild(label);

                // B端子 (後方: 終末ブロック以外)
                if (!isTerminal) {
                    const portB = document.createElement('div');
                    portB.dataset.port = 'B';
                    portB.className = "port absolute right-0 top-1/2 translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-gray-900 border-2 border-white cursor-pointer z-10 shadow";
                    blockEl.appendChild(portB);
                }

                // ドラッグ移動イベントの組み込み
                setupBlockDrag(blockEl, c);
                
                // コンテキストメニュー (右クリック削除)
                blockEl.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    rightClickedTargetId = c.id;
                    contextMenu.style.left = `${e.clientX}px`;
                    contextMenu.style.top = `${e.clientY}px`;
                    contextMenu.classList.remove('hidden');
                });

                // 端子クリック結線ロジック
                blockEl.querySelectorAll('.port').forEach(portEl => {
                    portEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handlePortClick(c.id, portEl.dataset.port, portEl);
                    });
                });

                editorWorkspace.appendChild(blockEl);
            });

            // 線の再描画 (非同期でDOM確定後に配置)
            setTimeout(() => {
                if(!window.LeaderLineScriptLoaded) return;
                state.wires.forEach(w => {
                    const fromEl = document.getElementById(w.from.blockId)?.querySelector(`[data-port="${w.from.port}"]`);
                    const toEl = document.getElementById(w.to.blockId)?.querySelector(`[data-port="${w.to.port}"]`);
                    
                    if(fromEl && toEl) {
                        const line = new LeaderLine(fromEl, toEl, {
                            color: '#38bdf8',
                            size: 3,
                            path: 'cubic',
                            startSocket: 'right',
                            endSocket: 'left'
                        });
                        // 線をクリックしたら削除可能にする機能
                        const svgLineEl = document.querySelector(`.leader-line:last-of-type`);
                        if (svgLineEl) {
                            svgLineEl.addEventListener('click', () => {
                                state.wires = state.wires.filter(item => item.id !== w.id);
                                line.remove();
                                saveHistory();
                                autoSaveToLocalStorage();
                            });
                        }
                        activeLineRenderers[w.id] = line;
                    }
                });
            }, 50);
        }

        // --- エディタ上でのブロックドラッグ処理 (ズーム補正計算入り) ---
        function setupBlockDrag(el, componentData) {
            let startX = 0, startY = 0;
            
            el.addEventListener('mousedown', (e) => {
                if(e.target.classList.contains('port')) return; // 端子操作時は無視
                if(e.button !== 0) return; // 左クリックのみ
                e.preventDefault();
                
                startX = e.clientX;
                startY = e.clientY;

                const onMouseMove = (moveEvent) => {
                    // ズーム倍率を考慮して移動量をデスケール
                    const dx = (moveEvent.clientX - startX) / zoom;
                    const dy = (moveEvent.clientY - startY) / zoom;
                    
                    componentData.x += dx;
                    componentData.y += dy;
                    
                    el.style.left = `${componentData.x}px`;
                    el.style.top = `${componentData.y}px`;
                    
                    startX = moveEvent.clientX;
                    startY = moveEvent.clientY;
                    
                    // 接続線をリアルタイム追従
                    if(window.LeaderLineScriptLoaded) {
                        Object.values(activeLineRenderers).forEach(line => line.position());
                    }
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    saveHistory();
                    autoSaveToLocalStorage();
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        // --- 端子接続ロジック ---
        function handlePortClick(blockId, portType, element) {
            if (!selectedPort) {
                // 最初の1つ目を選択
                selectedPort = { blockId, port: portType, element };
                element.classList.add('animate-ping');
            } else {
                // 2つ目の選択時の検証
                selectedPort.element.classList.remove('animate-ping');
                
                const p1 = selectedPort;
                const p2 = { blockId, port: portType, element };
                selectedPort = null;

                // 条件チェック: AA, BB の接続は不可。ABまたはBAのみ許可
                if (p1.port === p2.port) {
                    alert("同じ種類の端子（A同士、B同士）は接続できません。");
                    return;
                }
                if (p1.blockId === p2.blockId) {
                    alert("同じブロックの端子同士は接続できません。");
                    return;
                }

                // 常に向きを B -> A に統一して保存する
                const fromNode = p1.port === 'B' ? p1 : p2;
                const toNode = p1.port === 'A' ? p1 : p2;

                // 重複接続チェック
                const exists = state.wires.some(w => w.from.blockId === fromNode.blockId && w.from.port === fromNode.port && w.to.blockId === toNode.blockId && w.to.port === toNode.port);
                if (exists) return;

                const newWire = {
                    id: 'wire_' + Date.now() + Math.random().toString(36).substr(2, 5),
                    from: { blockId: fromNode.blockId, port: fromNode.port },
                    to: { blockId: toNode.blockId, port: toNode.port }
                };

                state.wires.push(newWire);
                renderWorkspace();
                saveHistory();
                autoSaveToLocalStorage();
            }
        }

        // --- イベントリスナーの一括セットアップ ---
        function setupEventListeners() {
            // ドロップダウン切り替え
            genreSelect.addEventListener('change', updatePalette);

            // ワークスペースへのドラッグ＆ドロップ受け入れ
            editorContainer.addEventListener('dragover', (e) => e.preventDefault());
            editorContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                try {
                    const rawData = e.dataTransfer.getData('text/plain');
                    if(!rawData) return;
                    const blockData = JSON.parse(rawData);
                    
                    // ドロップ座標からエディタ上の内部座標系に変換(ズーム考慮)
                    const rect = editorWorkspace.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / zoom;
                    const y = (e.clientY - rect.top) / zoom;

                    const newComponent = {
                        id: 'block_' + Date.now() + Math.random().toString(36).substr(2, 5),
                        type: 'word',
                        x: x - 50,
                        y: y - 20,
                        text: blockData.text,
                        value: blockData.value
                    };

                    state.components.push(newComponent);
                    renderWorkspace();
                    saveHistory();
                    autoSaveToLocalStorage();
                } catch(err) { console.error(err); }
            });

            // ズームイン・アウト
            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                if(zoom < 2.0) { zoom += 0.1; applyZoom(); }
            });
            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                if(zoom > 0.5) { zoom -= 0.1; applyZoom(); }
            });

            // 右クリックメニューの閉じる挙動
            document.addEventListener('click', () => contextMenu.classList.add('hidden'));
            document.getElementById('btn-ctx-delete').addEventListener('click', () => {
                if(rightClickedTargetId) {
                    // 関連するワイヤーも一緒に削除
                    state.wires = state.wires.filter(w => w.from.blockId !== rightClickedTargetId && w.to.blockId !== rightClickedTargetId);
                    state.components = state.components.filter(c => c.id !== rightClickedTargetId);
                    rightClickedTargetId = null;
                    renderWorkspace();
                    saveHistory();
                    autoSaveToLocalStorage();
                }
            });

            // モーダルの開閉制御
            const mediaModal = document.getElementById('modal-media');
            const addModal = document.getElementById('modal-add');
            
            document.getElementById('btn-open-media').addEventListener('click', () => mediaModal.classList.remove('hidden'));
            document.getElementById('btn-close-media').addEventListener('click', () => mediaModal.classList.add('hidden'));
            document.getElementById('btn-open-add').addEventListener('click', () => addModal.classList.remove('hidden'));
            document.getElementById('btn-close-add').addEventListener('click', () => addModal.classList.add('hidden'));

            // カスタムブロックの生成
            document.getElementById('btn-create-block').addEventListener('click', () => {
                const word = document.getElementById('add-word').value.trim();
                const pos = document.getElementById('add-pos').value;
                if(!word) return alert("英単語を入力してください");

                state.myBlocks.push({ text: word, value: pos });
                autoSaveToLocalStorage();
                updatePalette();
                
                document.getElementById('add-word').value = '';
                addModal.classList.add('hidden');
            });

            // インポート・エクスポート仕様の実装
            document.getElementById('btn-export').addEventListener('click', () => {
                const data = {
                    components: state.components.map(c => ({ id: c.id, type: c.type, x: c.x, y: c.y, value: c.value, text: c.text })),
                    wires: state.wires
                };
                saveCodeArea.value = utoa(JSON.stringify(data));
            });

            document.getElementById('btn-import').addEventListener('click', () => {
                const code = saveCodeArea.value.trim();
                if(!code) return;
                try {
                    const data = JSON.parse(atou(code));
                    state.components = data.components || [];
                    state.wires = data.wires || [];
                    renderWorkspace();
                    saveHistory();
                    autoSaveToLocalStorage();
                } catch(e) {
                    console.error(e);
                    alert("ロードに失敗しました。データが正しくないか、破損しています。");
                }
            });

            // 手動保存
            document.getElementById('btn-save').addEventListener('click', () => {
                autoSaveToLocalStorage();
                alert("LocalStorageへ現在の状態を保存しました。");
            });

            // Undo / Redo
            document.getElementById('btn-undo').addEventListener('click', () => {
                if(historyIndex > 0) {
                    historyIndex--;
                    loadStateFromHistory(history[historyIndex]);
                }
            });
            document.getElementById('btn-redo').addEventListener('click', () => {
                if(historyIndex < history.length - 1) {
                    historyIndex++;
                    loadStateFromHistory(history[historyIndex]);
                }
            });

            // スクショ・録画の開始処理
            document.getElementById('btn-start-media').addEventListener('click', () => {
                mediaModal.classList.add('hidden');
                const type = document.querySelector('input[name="media-type"]:checked').value;
                const range = document.getElementById('media-range').value;
                const targetEl = (range === 'editor') ? editorContainer : document.body;

                if (type === 'screenshot') {
                    // スクショ実行
                    html2canvas(targetEl, { useCORS: true, backgroundColor: '#030712' }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `screenshot_${Date.now()}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    });
                } else {
                    // 録画開始
                    startRecording(targetEl);
                }
            });

            document.getElementById('btn-stop-record').addEventListener('click', stopRecording);
        }

        function applyZoom() {
            editorWorkspace.style.transform = `scale(${zoom})`;
            zoomDisplay.textContent = `${Math.round(zoom * 100)}%`;
            // 線レンダラーの位置の再修正
            if(window.LeaderLineScriptLoaded) {
                Object.values(activeLineRenderers).forEach(line => line.position());
            }
        }

        // --- 履歴管理 (Undo / Redo 用) ---
        function saveHistory() {
            const currentSnapshot = JSON.stringify({ components: state.components, wires: state.wires });
            // 前回の履歴と同じなら記録しない
            if (historyIndex >= 0 && history[historyIndex] === currentSnapshot) return;

            // 途中で新操作が行われたらそれ以降のRedo履歴を切り捨てる
            history = history.slice(0, historyIndex + 1);
            history.push(currentSnapshot);
            historyIndex++;
        }

        function loadStateFromHistory(snapshotStr) {
            const data = JSON.parse(snapshotStr);
            state.components = data.components || [];
            state.wires = data.wires || [];
            renderWorkspace();
            autoSaveToLocalStorage();
        }

        // --- LocalStorage 保存・同期 ---
        function autoSaveToLocalStorage() {
            localStorage.setItem('eng_editor_workspace', JSON.stringify({ components: state.components, wires: state.wires }));
            localStorage.setItem('eng_editor_myblocks', JSON.stringify(state.myBlocks));
        }

        function loadFromLocalStorage() {
            const workspaceData = localStorage.getItem('eng_editor_workspace');
            const myblocksData = localStorage.getItem('eng_editor_myblocks');
            
            if (workspaceData) {
                const parsed = JSON.parse(workspaceData);
                state.components = parsed.components || [];
                state.wires = parsed.wires || [];
            }
            if (myblocksData) {
                state.myBlocks = JSON.parse(myblocksData);
            }
        }

        // --- 画面録画（WebM対応）機能 ---
        async function startRecording(targetElement) {
            recordedChunks = [];
            try {
                // ブラウザ標準の画面キャプチャAPIを起動
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720 },
                    audio: false
                });

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `editor_record_${Date.now()}.webm`;
                    link.click();
                    
                    // トラックをすべて閉じて共有中インジケータを消す
                    stream.getTracks().forEach(track => track.stop());
                    document.getElementById('btn-stop-record').classList.add('hidden');
                };

                mediaRecorder.start();
                document.getElementById('btn-stop-record').classList.remove('hidden');
            } catch (err) {
                console.error("録画の開始に失敗しました:", err);
                alert("画面キャプチャの許可が得られなかったか、ブラウザが対応していません。");
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }
    </script>
</body>
</html>
